<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Class-Recorder</title>
    <style>
        :root {
            --primary: #4776E6;
            --secondary: #8E54E9;
            --success: #27ae60;
            --warning: #f39c12;
            --danger: #ff4757;
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #2f3542;
            --text-sub: #747d8c;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: -apple-system, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
            padding-bottom: 140px;
        }

        header { margin: 10px 0 20px; text-align: center; }
        h1 {
            font-size: 1.6rem;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .total-dashboard {
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            background: #2f3542;
            border-radius: 18px;
            color: white;
            margin-bottom: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        .total-item { text-align: center; }
        .total-label { font-size: 11px; opacity: 0.8; margin-bottom: 4px; }
        .total-value { font-size: 1.1rem; font-weight: 700; }

        .package-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.8);
        }

        .package-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
            padding-bottom: 12px;
            border-bottom: 1px dashed #eee;
        }

        .package-title { font-weight: 800; font-size: 17px; color: var(--text-main); }
        .package-date { font-size: 12px; color: var(--text-sub); margin-top: 2px; }
        
        .package-balance { text-align: right; }
        .balance-num { font-size: 22px; font-weight: 800; }
        .balance-num.positive { color: var(--success); }
        .balance-num.negative { color: var(--danger); }
        .balance-label { font-size: 11px; color: var(--text-sub); }

        .lesson-list { margin-top: 10px; }
        .lesson-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            font-size: 14px;
            border-bottom: 1px solid #f9f9f9;
        }
        .lesson-item:last-child { border-bottom: none; }
        .lesson-info { display: flex; flex-direction: column; flex: 1; }
        .lesson-topic { font-weight: 500; }
        .lesson-date { font-size: 11px; color: var(--text-sub); }
        
        .lesson-action { display: flex; align-items: center; gap: 10px; }
        .lesson-amount { font-weight: 600; color: var(--text-main); }
        .btn-delete-item {
            color: #ccc;
            padding: 5px 8px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
            transition: all 0.2s;
        }
        .btn-delete-item:active { background: #fff5f5; color: var(--danger); }

        .fab-container {
            position: fixed;
            bottom: 30px; left: 0; right: 0;
            display: flex; flex-direction: column; align-items: center; gap: 12px; z-index: 1000;
        }
        .btn-main {
            width: 80%; max-width: 300px; padding: 16px; border-radius: 50px; border: none;
            color: white; font-weight: 700; font-size: 16px;
            box-shadow: 0 10px 25px rgba(71, 118, 230, 0.3);
            background: linear-gradient(135deg, var(--primary), var(--secondary));
        }
        .btn-sub-group { display: flex; gap: 15px; }
        .btn-small { padding: 8px 18px; border-radius: 20px; border: 1px solid #ddd; background: white; font-size: 13px; color: var(--text-sub); }

        .modal-overlay {
            position: fixed; top:0; left:0; right:0; bottom:0;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
            display: none; align-items: center; justify-content: center; padding: 20px; z-index: 2000;
        }
        .modal { background: white; padding: 25px; border-radius: 24px; width: 100%; max-width: 340px; }
        input { width: 100%; padding: 14px; margin-bottom: 12px; border: 2px solid #f1f2f6; border-radius: 12px; font-size: 16px; outline: none; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn-confirm { flex: 2; padding: 14px; border-radius: 12px; border: none; background: var(--primary); color: white; font-weight: 600; }
        .btn-cancel { flex: 1; padding: 14px; border-radius: 12px; border: 1px solid #eee; background: #fff; }
        .empty-state { text-align: center; padding: 50px 20px; color: var(--text-sub); font-size: 14px; }
    </style>
</head>
<body>

    <header>
        <h1>Class Recorder</h1>
    </header>

    <div class="total-dashboard">
        <div class="total-item">
            <div class="total-label">累计入账</div>
            <div id="total-in" class="total-value">¥0</div>
        </div>
        <div class="total-item" style="border-left: 1px solid rgba(255,255,255,0.2); padding-left: 20px;">
            <div class="total-label">总消耗</div>
            <div id="total-out" class="total-value">¥0</div>
        </div>
        <div class="total-item" style="border-left: 1px solid rgba(255,255,255,0.2); padding-left: 20px;">
            <div class="total-label">总剩余</div>
            <div id="total-net" class="total-value">¥0</div>
        </div>
    </div>

    <div id="package-container"></div>

    <div class="fab-container">
        <button class="btn-main" onclick="openModal('EXPENSE')">✨ 记一节课</button>
        <div class="btn-sub-group">
            <button class="btn-small" onclick="openModal('INCOME')">💰 新入账包</button>
            <button class="btn-small" onclick="resetData()">🧹 清空</button>
        </div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h3 id="modal-title" style="margin-bottom: 15px;">入账金额</h3>
            <input type="number" id="amount-input" placeholder="输入金额" inputmode="decimal">
            <input type="text" id="topic-input" placeholder="备注主题">
            <div class="btn-group">
                <button class="btn-cancel" onclick="closeModal()">取消</button>
                <button class="btn-confirm" onclick="handleSubmit()">确认保存</button>
            </div>
        </div>
    </div>

    <script>
        let storage = JSON.parse(localStorage.getItem('tutor_pkg_v1')) || { packages: [] };
        let currentMode = 'INCOME';

        function saveData() {
            localStorage.setItem('tutor_pkg_v1', JSON.stringify(storage));
            render();
        }

        function openModal(mode) {
            currentMode = mode;
            const modal = document.getElementById('modal');
            const title = document.getElementById('modal-title');
            const amtInput = document.getElementById('amount-input');
            const topicInput = document.getElementById('topic-input');
            modal.style.display = 'flex';
            if (mode === 'INCOME') {
                title.innerText = "新建入账包";
                amtInput.value = "";
                topicInput.placeholder = "包名称";
            } else {
                if (storage.packages.length === 0) { alert("请先创建一个入账包！"); closeModal(); return; }
                title.innerText = "记一节课";
                amtInput.value = "120";
                topicInput.placeholder = "上课内容";
            }
            amtInput.focus();
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function handleSubmit() {
            const amount = parseFloat(document.getElementById('amount-input').value);
            const topic = document.getElementById('topic-input').value.trim() || (currentMode === 'INCOME' ? "新课时包" : "常规课");
            if (!amount) return;
            if (currentMode === 'INCOME') {
                const newPkg = { id: Date.now(), amount: amount, topic: topic, date: new Date().toLocaleDateString(), lessons: [] };
                storage.packages.unshift(newPkg);
            } else {
                const activePkg = storage.packages[0];
                activePkg.lessons.unshift({
                    id: Date.now(), // 给每条记录加个ID方便删除
                    topic: topic,
                    amount: amount,
                    date: new Date().toLocaleString('zh-CN', {month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'})
                });
            }
            saveData();
            closeModal();
        }

        // 删除单条记录
        function deleteLesson(pkgId, lessonId) {
            if(confirm("确定删除这条课时记录吗？")) {
                const pkg = storage.packages.find(p => p.id === pkgId);
                if (pkg) {
                    pkg.lessons = pkg.lessons.filter(l => l.id !== lessonId);
                    saveData();
                }
            }
        }

        // 删除整个包
        function deletePackage(id) {
            if(confirm("确定要删除整个包及其所有记录吗？")) {
                storage.packages = storage.packages.filter(p => p.id !== id);
                saveData();
            }
        }

        function resetData() {
            if(confirm("确定清空所有数据吗？")) { storage.packages = []; saveData(); }
        }

        function render() {
            const container = document.getElementById('package-container');
            const totalInDisp = document.getElementById('total-in');
            const totalOutDisp = document.getElementById('total-out');
            const totalNetDisp = document.getElementById('total-net');
            container.innerHTML = '';
            let overallIn = 0, overallOut = 0;

            if (storage.packages.length === 0) {
                container.innerHTML = '<div class="empty-state">目前没有记录，请点击“新入账包”开始</div>';
            }

            storage.packages.forEach(pkg => {
                const spent = pkg.lessons.reduce((sum, l) => sum + l.amount, 0);
                const balance = pkg.amount - spent;
                overallIn += pkg.amount;
                overallOut += spent;

                let lessonsHtml = pkg.lessons.map(l => `
                    <div class="lesson-item">
                        <div class="lesson-info">
                            <span class="lesson-topic">${l.topic}</span>
                            <span class="lesson-date">${l.date}</span>
                        </div>
                        <div class="lesson-action">
                            <span class="lesson-amount">-￥${l.amount}</span>
                            <span class="btn-delete-item" onclick="deleteLesson(${pkg.id}, ${l.id})">×</span>
                        </div>
                    </div>
                `).join('');

                container.innerHTML += `
                    <div class="package-card" ondblclick="deletePackage(${pkg.id})">
                        <div class="package-header">
                            <div>
                                <div class="package-title">${pkg.topic}</div>
                                <div class="package-date">入账: ￥${pkg.amount} · ${pkg.date}</div>
                            </div>
                            <div class="package-balance">
                                <div class="balance-label">剩余余额</div>
                                <div class="balance-num ${balance < 0 ? 'negative' : 'positive'}">
                                    ${balance.toFixed(0)}
                                </div>
                            </div>
                        </div>
                        <div class="lesson-list">
                            ${lessonsHtml || '<div style="color:#ccc; font-size:12px; text-align:center; padding:10px;">暂无消耗记录</div>'}
                        </div>
                    </div>
                `;
            });

            totalInDisp.innerText = `¥${overallIn.toFixed(0)}`;
            totalOutDisp.innerText = `¥${overallOut.toFixed(0)}`;
            const net = overallIn - overallOut;
            totalNetDisp.innerText = `¥${net.toFixed(0)}`;
            totalNetDisp.style.color = net < 0 ? 'var(--danger)' : 'white';
        }
        render();
    </script>
</body>
</html>
